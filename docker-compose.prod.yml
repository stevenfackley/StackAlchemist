services:
  reverse-proxy:
    image: nginx:alpine
    container_name: sa-reverse-proxy
    restart: unless-stopped
    depends_on:
      sa-web:
        condition: service_healthy
      sa-engine:
        condition: service_healthy
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - stackalchemist-prod

  sa-web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://stackalchemist.app}
    container_name: sa-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://stackalchemist.app}
      NEXT_PUBLIC_IS_TEST_SITE: ${NEXT_PUBLIC_IS_TEST_SITE:-false}
      ENGINE_API_URL: ${ENGINE_API_URL:-http://sa-engine}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      ENGINE_SERVICE_KEY: ${ENGINE_SERVICE_KEY:-}
      # SEO / Analytics — only populated on prod, empty elsewhere.
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
    healthcheck:
      # /api/healthz is exempt from Basic Auth; keeps probes healthy across envs.
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - stackalchemist-prod

  sa-engine:
    build:
      context: .
      target: engine
    container_name: sa-engine
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:80
      API_PORT: ${API_PORT:-5000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-stackalchemist-generations-prod}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      R2_S3_URL: ${R2_S3_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      ENGINE_SERVICE_KEY: ${ENGINE_SERVICE_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stackalchemist-prod

networks:
  stackalchemist-prod:
    name: stackalchemist-prod

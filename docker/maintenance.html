<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StackAlchemist — Updating</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #09090b;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 24px;
    max-width: 480px;
  }

  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fafafa;
  }

  .logo span {
    color: #a855f7;
  }

  .spinner-ring {
    width: 56px;
    height: 56px;
    border: 3px solid #27272a;
    border-top-color: #a855f7;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .headline {
    font-size: 20px;
    font-weight: 600;
    color: #fafafa;
    line-height: 1.4;
  }

  .subtext {
    font-size: 14px;
    color: #71717a;
    line-height: 1.6;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 9999px;
    padding: 6px 14px;
    font-size: 12px;
    color: #a1a1aa;
    letter-spacing: 0.3px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #a855f7;
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Stack<span>Alchemist</span></div>
  <div class="spinner-ring"></div>
  <div class="headline">Brewing a new version</div>
  <div class="subtext">We're deploying an update. This usually takes a couple of minutes — check back shortly.</div>
  <div class="badge">
    <div class="dot"></div>
    Deployment in progress
  </div>
</div>
</body>
</html>

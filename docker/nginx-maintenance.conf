server {
    # Prod tunnel ingress hits reverse-proxy:80; test tunnel hits sa-web:3000.
    # Listen on both so this shim actually fronts the tunnel during a deploy on
    # either topology — on :80-only it never covered prod and leaked 502s.
    listen 80;
    listen 3000;
    server_name _;

    # Return 503 (not a 200 page) so API clients and Stripe webhooks that hit the
    # deploy window treat it as retryable instead of a delivered 2xx that's lost.
    # Browsers still render the body; the status is the only difference.
    location / {
        return 503;
    }

    error_page 503 /maintenance.html;
    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Retry-After "30" always;
        add_header X-Maintenance "1" always;
    }
}

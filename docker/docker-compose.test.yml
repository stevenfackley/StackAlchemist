services:
  sa-engine:
    container_name: sa-engine
    build:
      context: ..
      target: engine
    ports:
      - "5000:80"
    env_file:
      - ../.env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - stackalchemist-test

  sa-worker:
    container_name: sa-worker
    build:
      context: ..
      target: worker
    env_file:
      - ../.env
    restart: always
    networks:
      - stackalchemist-test

  sa-web:
    container_name: sa-web
    build:
      context: ..
      target: web
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    restart: always
    depends_on:
      sa-engine:
        condition: service_healthy
    healthcheck:
      # Use /api/healthz — exempt from Basic Auth and always returns 200.
      # Hitting / would fail once Basic Auth is configured.
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - stackalchemist-test

networks:
  stackalchemist-test:
    name: stackalchemist-test

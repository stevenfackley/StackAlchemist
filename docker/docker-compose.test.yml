services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.test
    restart: always

  engine:
    image: ghcr.io/${GITHUB_REPOSITORY}/engine:latest
    ports:
      - "5000:80"
    env_file:
      - .env.test
    restart: always

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}/worker:latest
    env_file:
      - .env.test
    restart: always

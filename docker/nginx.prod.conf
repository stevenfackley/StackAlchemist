events {}

http {
  # Docker's embedded DNS. Resolving upstream names at request time (not at
  # config load) keeps nginx from aborting with "host not found in upstream"
  # when a backend is briefly unresolvable during a deploy/restart — that crash
  # is what strands the Cloudflare Tunnel and surfaces a CF-branded 502. The
  # short `valid` also lets nginx pick up a backend's new container IP instead
  # of pinning the stale one resolved at startup.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # End-to-end liveness probe — must match before the /api/ rule so nginx
    # delivers it to Next.js (which exempts it from the test-site Basic Auth
    # middleware and always returns 200). Used by the prod deploy workflow and
    # the Cloudflare Tunnel health monitoring.
    location = /api/healthz {
      set $web_upstream sa-web:3000;
      proxy_pass http://$web_upstream;
      access_log off;
      proxy_intercept_errors on;
      error_page 502 503 504 =503 @maintenance;
    }

    location /api/ {
      set $engine_upstream sa-engine:80;
      proxy_pass http://$engine_upstream;
      proxy_intercept_errors on;
      error_page 502 503 504 =503 @maintenance;
    }

    location / {
      set $web_upstream sa-web:3000;
      proxy_pass http://$web_upstream;
      proxy_intercept_errors on;
      error_page 502 503 504 =503 @maintenance;
    }

    location @maintenance {
      root /usr/share/nginx/html;
      rewrite ^ /maintenance.html break;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header Retry-After "120";
    }
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
}
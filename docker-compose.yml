services:
  sa-web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    depends_on:
      - sa-engine
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  sa-engine:
    build:
      context: .
      target: engine
    ports:
      - "5000:80"
    env_file:
      - .env.development

  sa-worker:
    build:
      context: .
      target: worker
    env_file:
      - .env.development
    depends_on:
      - sa-engine

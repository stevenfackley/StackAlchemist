services:
  sa-web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    depends_on:
      - sa-engine

  sa-engine:
    build:
      context: .
      target: engine
    ports:
      - "5000:80"
    env_file:
      - .env.development

  sa-worker:
    build:
      context: .
      target: worker
    env_file:
      - .env.development
    depends_on:
      - sa-engine

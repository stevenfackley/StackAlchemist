name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Placeholder to Test Server
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restart placeholder service
        working-directory: src/StackAlchemist.Placeholder
        run: |
          docker compose down --remove-orphans
          docker compose up -d
          echo "✅ Deploy complete."
          docker compose ps

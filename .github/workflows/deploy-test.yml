name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Placeholder to Test Server
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push updated files into running nginx container
        run: |
          docker cp src/StackAlchemist.Placeholder/index.html sa-web:/usr/share/nginx/html/index.html
          echo "✅ Deploy complete — nginx serving new content immediately."
          docker exec sa-web nginx -t

name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Web App to Test Server
    runs-on:
      - self-hosted
      - Linux
      - X64
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env (test)
        uses: ./.github/actions/setup-env
        with:
          environment: test
          app_url: https://test.stackalchemist.app
          aspnetcore_environment: Staging
          api_port: '5000'
          engine_api_url: http://sa-engine
          is_test_site: 'true'
          supabase_url: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID || secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-test
          r2_public_url: ${{ secrets.R2_PUBLIC_URL }}
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN || secrets.CF_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY || secrets.CLAUDE_API_KEY }}
          engine_service_key: ${{ secrets.ENGINE_SERVICE_KEY }}

      - name: Docker pre-flight cleanup
        shell: bash
        run: bash ./scripts/docker-preflight-cleanup.sh

      - name: Build and Deploy Stack
        env:
          DOCKER_BUILDKIT: '1'
          NEXT_PUBLIC_APP_URL: https://test.stackalchemist.app
        run: |
          set -Eeuo pipefail

          # Force-remove any lingering containers with our names.
          # Covers: failed deploys, placeholder containers, and docker-daemon restarts
          # that brought back containers with --restart unless-stopped.
          docker rm -f sa-web sa-engine sa-worker 2>/dev/null || true

          # Build using layer cache. The install/restore layers are cached between
          # runs and only invalidated when package.json / .csproj files change.
          # --pull refreshes base images (security patches) without blowing away
          # intermediate layers.
          docker compose -f docker/docker-compose.test.yml build --pull

          # Recreate the stack and block until all services report healthy.
          # Health checks are defined in docker-compose.test.yml.
          # This replaces the manual polling loop that was error-prone.
          docker compose -f docker/docker-compose.test.yml up -d --force-recreate --wait

          echo "✅ Stack deployed and healthy."
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Fallback to placeholder on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — restoring under-construction placeholder..."
          docker compose -f docker/docker-compose.test.yml down -v 2>/dev/null || true

          # Remove any partial containers left from the failed deploy
          docker rm -f sa-web sa-engine sa-worker 2>/dev/null || true

          # Ensure the expected network exists for the placeholder
          docker network create under-construction_default 2>/dev/null || true

          MOUNTS=""
          [ -f /root/under-construction/index.html ] && MOUNTS="$MOUNTS -v /root/under-construction/index.html:/usr/share/nginx/html/index.html:ro"
          [ -f /root/under-construction/favicon.svg ] && MOUNTS="$MOUNTS -v /root/under-construction/favicon.svg:/usr/share/nginx/html/favicon.svg:ro"
          [ -f /root/under-construction/nginx.conf ]  && MOUNTS="$MOUNTS -v /root/under-construction/nginx.conf:/etc/nginx/nginx.conf:ro"

          # --restart no: placeholder is intentionally transient.
          # The next successful deploy will bring up the real stack.
          # Using --restart unless-stopped was causing name conflicts on daemon restart.
          docker run -d \
            --name sa-web \
            --restart no \
            --network under-construction_default \
            -p 3000:3000 \
            $MOUNTS \
            nginx:alpine
          echo "Placeholder restored."

      - name: Post-deploy Docker cleanup
        if: always()
        run: |
          docker image prune -f 2>/dev/null || true
          docker builder prune -f --filter "until=1h" 2>/dev/null || true
          echo "── Post-deploy disk usage ──"
          df -h / 2>/dev/null || true

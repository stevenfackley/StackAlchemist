name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Web App to Test Server
    runs-on:
      - self-hosted
      - Linux
      - X64
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env (test)
        uses: ./.github/actions/setup-env
        with:
          environment: test
          app_url: https://test.stackalchemist.app
          aspnetcore_environment: Staging
          api_port: '5000'
          engine_api_url: http://sa-engine
          is_test_site: 'true'
          supabase_url: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID || secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-test
          r2_public_url: ${{ secrets.R2_PUBLIC_URL }}
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN || secrets.CF_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY || secrets.CLAUDE_API_KEY }}
          engine_service_key: ${{ secrets.ENGINE_SERVICE_KEY }}

      - name: Docker pre-flight cleanup
        shell: bash
        run: bash ./scripts/docker-preflight-cleanup.sh

      - name: Build Docker images
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          set -Eeuo pipefail

          # Build Engine
          docker build --target engine --pull --no-cache -t sa-engine:test .
          # Build Worker
          docker build --target worker --pull --no-cache -t sa-worker:test .
          # Build Web
          docker build --target web --pull --no-cache --build-arg NEXT_PUBLIC_APP_URL=https://test.stackalchemist.app -t sa-web-app:test .

          echo "✅ All test images built."

      - name: Ensure Docker network
        run: |
          docker network create under-construction_default 2>/dev/null || true

      - name: Deploy Stack
        run: |
          set -Eeuo pipefail

          # 1. Update sa-engine
          docker stop sa-engine 2>/dev/null || true
          docker rm sa-engine 2>/dev/null || true
          docker run -d \
            --name sa-engine \
            --restart unless-stopped \
            --network under-construction_default \
            -p 5000:80 \
            --env-file .env \
            sa-engine:test

          # 2. Update sa-worker
          docker stop sa-worker 2>/dev/null || true
          docker rm sa-worker 2>/dev/null || true
          docker run -d \
            --name sa-worker \
            --restart unless-stopped \
            --network under-construction_default \
            --env-file .env \
            sa-worker:test

          # 3. Update sa-web
          docker stop sa-web 2>/dev/null || true
          docker rm sa-web 2>/dev/null || true
          docker run -d \
            --name sa-web \
            --restart unless-stopped \
            --network under-construction_default \
            -p 3000:3000 \
            --env-file .env \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_APP_URL=https://test.stackalchemist.app \
            sa-web-app:test

          echo "✅ Stack updated. Waiting for health checks..."

      - name: Verify Health
        run: |
          set -Eeuo pipefail

          # Wait for engine
          echo "Checking sa-engine health..."
          for i in {1..10}; do
            if docker exec sa-engine wget -qO /dev/null http://localhost:80/healthz 2>/dev/null; then
              echo "✅ sa-engine is healthy."
              break
            fi
            [ "$i" -eq 10 ] && echo "❌ sa-engine failed health check" && exit 1
            sleep 3
          done

          # Wait for web
          echo "Checking sa-web health..."
          for i in {1..10}; do
            if docker exec sa-web node -e "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" 2>/dev/null; then
              echo "✅ sa-web is healthy."
              break
            fi
            [ "$i" -eq 10 ] && echo "❌ sa-web failed health check" && exit 1
            sleep 3
          done

          echo "✅ Deployment verified."
          docker ps --filter network=under-construction_default --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Fallback to placeholder on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — restoring under-construction placeholder..."
          docker stop sa-web 2>/dev/null || true
          docker rm sa-web 2>/dev/null || true

          MOUNTS=""
          [ -f /root/under-construction/index.html ] && MOUNTS="$MOUNTS -v /root/under-construction/index.html:/usr/share/nginx/html/index.html:ro"
          [ -f /root/under-construction/favicon.svg ] && MOUNTS="$MOUNTS -v /root/under-construction/favicon.svg:/usr/share/nginx/html/favicon.svg:ro"
          [ -f /root/under-construction/nginx.conf ] && MOUNTS="$MOUNTS -v /root/under-construction/nginx.conf:/etc/nginx/nginx.conf:ro"

          docker run -d \
            --name sa-web \
            --restart unless-stopped \
            --network under-construction_default \
            -p 3000:3000 \
            $MOUNTS \
            nginx:alpine
          echo "Placeholder restored."

      - name: Post-deploy Docker cleanup
        if: always()
        run: |
          # Prune any dangling layers and build cache produced by this run.
          # Runs even on failure so disk is reclaimed regardless of outcome.
          docker image prune -f 2>/dev/null || true
          docker builder prune -f --filter "until=1h" 2>/dev/null || true
          echo "── Post-deploy disk usage ──"
          df -h / 2>/dev/null || true

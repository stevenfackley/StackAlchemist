name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Placeholder to Test Server
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update site files on host
        run: |
          cp src/StackAlchemist.Placeholder/index.html /root/under-construction/index.html
          cp src/StackAlchemist.Placeholder/favicon.svg /root/under-construction/favicon.svg
          echo "✅ Deploy complete — nginx reading new files from host immediately."

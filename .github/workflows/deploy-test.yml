name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Web App to Test Server
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env (test)
        uses: ./.github/actions/setup-env
        with:
          environment: test
          app_url: https://test.stackalchemist.app
          aspnetcore_environment: Staging
          api_port: '5000'
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-test
          r2_public_url: https://pub-test.stackalchemist.app
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build Next.js web image
        env:
          DOCKER_BUILDKIT: '0'
        run: |
          # Work around intermittent BuildKit/containerd snapshot export failures
          # seen on the self-hosted runner when loading the final image locally.
          docker build \
            --target web \
            --build-arg NEXT_PUBLIC_APP_URL=https://test.stackalchemist.app \
            -t sa-web-app:test \
            .

      - name: Swap web container
        run: |
          # Stop and remove the old container (nginx placeholder or previous web app)
          docker stop sa-web 2>/dev/null || true
          docker rm sa-web 2>/dev/null || true

          # Start the new Next.js container on the shared tunnel network
          docker run -d \
            --name sa-web \
            --restart unless-stopped \
            --network under-construction_default \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_APP_URL=https://test.stackalchemist.app \
            sa-web-app:test

          echo "✅ Web app deployed."
          docker ps --filter name=sa-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Fallback to placeholder on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — restoring under-construction placeholder..."
          docker stop sa-web 2>/dev/null || true
          docker rm sa-web 2>/dev/null || true
          docker run -d \
            --name sa-web \
            --restart unless-stopped \
            --network under-construction_default \
            -p 3000:3000 \
            -v /root/under-construction/index.html:/usr/share/nginx/html/index.html:ro \
            -v /root/under-construction/favicon.svg:/usr/share/nginx/html/favicon.svg:ro \
            -v /root/under-construction/nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:alpine
          echo "Placeholder restored."

name: Deploy Test Site

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-test
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy Web App to Test Server
    timeout-minutes: 30
    runs-on:
      - self-hosted
      - Linux
      - X64
    environment: test
    env:
      COMPOSE_PROJECT_NAME: stackalchemist-test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .env (test)
        uses: ./.github/actions/setup-env
        with:
          environment: test
          app_url: https://test.stackalchemist.app
          aspnetcore_environment: Staging
          api_port: '5000'
          engine_api_url: http://sa-engine
          is_test_site: 'true'
          supabase_url: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID || secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-test
          r2_public_url: ${{ secrets.R2_PUBLIC_URL }}
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN || secrets.CF_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY || secrets.CLAUDE_API_KEY }}
          engine_service_key: ${{ secrets.ENGINE_SERVICE_KEY }}
          # Test mirror must never report to Plausible or be indexed by Google.
          # Basic Auth gates human access; noindex/X-Robots-Tag blocks crawlers.
          plausible_domain: ''
          google_site_verification: ''
          test_site_basic_auth_user: ${{ secrets.TEST_SITE_BASIC_AUTH_USER }}
          test_site_basic_auth_pass: ${{ secrets.TEST_SITE_BASIC_AUTH_PASS }}

      - name: Docker pre-flight cleanup
        shell: bash
        run: bash ./scripts/docker-preflight-cleanup.sh

      - name: Runner diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Runner: ${RUNNER_NAME:-unknown} (${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown})"
          echo "Docker version:"
          docker version
          echo ""
          echo "Docker system usage:"
          docker system df || true
          echo ""
          echo "Disk usage:"
          df -h / || true
          echo ""
          echo "Memory:"
          free -h || true

      - name: Start maintenance page
        shell: bash
        run: |
          # Tear down the old stack so the new build can replace it.
          # This runs before the docker build, so visitors would otherwise
          # see a 502 for the full build duration (2-4 min). Instead we
          # swap in a lightweight maintenance page as sa-web so the tunnel
          # keeps serving real HTTP traffic right up until the new stack lands.
          docker rm -f sa-web sa-engine sa-worker 2>/dev/null || true

          # Ensure the network exists. compose up will create it, but we need
          # it now so the maintenance container and tunnel can talk.
          docker network create stackalchemist-test 2>/dev/null || true

          docker run -d \
            --name sa-web \
            --restart no \
            --network stackalchemist-test \
            -p 3000:3000 \
            -v "$(pwd)/docker/maintenance.html:/usr/share/nginx/html/maintenance.html:ro" \
            -v "$(pwd)/docker/nginx-maintenance.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine

          # Reconnect tunnel so it can route to the maintenance container.
          if docker inspect sa-test-tunnel &>/dev/null; then
            docker network connect stackalchemist-test sa-test-tunnel 2>/dev/null || true
            echo "✅ sa-test-tunnel connected — maintenance page is live."
          fi

      - name: Build and Deploy Stack
        env:
          DOCKER_BUILDKIT: '1'
          NEXT_PUBLIC_APP_URL: https://test.stackalchemist.app
        run: |
          set -Eeuo pipefail

          # Build using layer cache. The install/restore layers are cached between
          # runs and only invalidated when package.json / .csproj files change.
          # --pull refreshes base images (security patches) without blowing away
          # intermediate layers.
          docker compose -f docker/docker-compose.test.yml build --pull

          # Remove the maintenance sa-web before compose up so --force-recreate
          # can create the real container without a name conflict.
          docker rm -f sa-web 2>/dev/null || true

          # Recreate the stack and block until all services report healthy.
          # Health checks are defined in docker-compose.test.yml.
          docker compose -f docker/docker-compose.test.yml up -d --force-recreate --wait

          # Reconnect the persistent Cloudflare tunnel container to our network.
          # sa-test-tunnel is long-lived and not in our compose file. Each deploy
          # creates a fresh stackalchemist-test network, so the tunnel loses access
          # to sa-web by container name. Reconnecting here fixes 502s after deploy.
          if docker inspect sa-test-tunnel &>/dev/null; then
            docker network connect stackalchemist-test sa-test-tunnel 2>/dev/null || true
            echo "✅ sa-test-tunnel reconnected to stackalchemist-test network."
          fi

          echo "✅ Stack deployed and healthy."
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Capture deploy diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts/deploy-test
          docker ps -a > .artifacts/deploy-test/docker-ps.txt
          docker compose -f docker/docker-compose.test.yml ps > .artifacts/deploy-test/compose-ps.txt 2>&1
          docker logs sa-engine > .artifacts/deploy-test/sa-engine.log 2>&1 || true
          docker logs sa-web > .artifacts/deploy-test/sa-web.log 2>&1 || true
          docker logs sa-worker > .artifacts/deploy-test/sa-worker.log 2>&1 || true
          docker compose -f docker/docker-compose.test.yml logs --tail 200 > .artifacts/deploy-test/compose.log 2>&1 || true

      - name: Upload deploy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-test-diagnostics
          path: .artifacts/deploy-test/
          retention-days: 7

      - name: Fallback to placeholder on failure
        if: failure()
        shell: bash
        run: |
          echo "⚠️ Deploy failed — restoring maintenance placeholder..."
          docker compose -f docker/docker-compose.test.yml down -v 2>/dev/null || true
          docker rm -f sa-web sa-engine sa-worker 2>/dev/null || true

          docker network create stackalchemist-test 2>/dev/null || true

          # Re-run the maintenance page so users see a proper message
          # rather than a tunnel error. --restart no: transient container,
          # the next successful deploy will swap it out.
          docker run -d \
            --name sa-web \
            --restart no \
            --network stackalchemist-test \
            -p 3000:3000 \
            -v "$(pwd)/docker/maintenance.html:/usr/share/nginx/html/maintenance.html:ro" \
            -v "$(pwd)/docker/nginx-maintenance.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine

          if docker inspect sa-test-tunnel &>/dev/null; then
            docker network connect stackalchemist-test sa-test-tunnel 2>/dev/null || true
          fi
          echo "Maintenance placeholder restored."

      - name: Post-deploy Docker cleanup
        if: always()
        shell: bash
        run: |
          docker image prune -f 2>/dev/null || true
          docker builder prune -f --filter "until=1h" 2>/dev/null || true
          echo "── Post-deploy disk usage ──"
          df -h / 2>/dev/null || true

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"

jobs:
  frontend:
    name: Frontend (Lint, Typecheck, Unit Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/StackAlchemist.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: src/StackAlchemist.Web/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit & Integration Tests
        run: npx vitest run --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: src/StackAlchemist.Web/test-results/
          retention-days: 7

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/StackAlchemist.Web/coverage/
          retention-days: 7

  backend:
    name: Backend (.NET Build & Test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stackalchemist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Engine
        run: dotnet build src/StackAlchemist.Engine/ --no-restore --configuration Release
        continue-on-error: true

      - name: Build Worker
        run: dotnet build src/StackAlchemist.Worker/ --no-restore --configuration Release
        continue-on-error: true

      - name: Build Engine Tests
        run: dotnet build src/StackAlchemist.Engine.Tests/ --no-restore --configuration Release

      - name: Build Worker Tests
        run: dotnet build src/StackAlchemist.Worker.Tests/ --no-restore --configuration Release

      - name: Run Engine Tests
        run: dotnet test src/StackAlchemist.Engine.Tests/ --no-build --configuration Release --logger "trx;LogFileName=engine-test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=stackalchemist_test;Username=test;Password=test"

      - name: Run Worker Tests
        run: dotnet test src/StackAlchemist.Worker.Tests/ --no-build --configuration Release --logger "trx;LogFileName=worker-test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=stackalchemist_test;Username=test;Password=test"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/"
          retention-days: 7

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [web, engine, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: stackalchemist/${{ matrix.target }}:ci

  e2e-smoke:
    name: E2E Smoke (Playwright, Demo Mode)
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: src/StackAlchemist.Web/pnpm-lock.yaml

      - name: Install Dependencies
        working-directory: src/StackAlchemist.Web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        working-directory: src/StackAlchemist.Web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright Smoke Tests
        working-directory: src/StackAlchemist.Web
        run: pnpm run e2e:smoke
        env:
          CI: true

      - name: Upload Smoke Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: src/StackAlchemist.Web/playwright-report/
          retention-days: 7

      - name: Upload Smoke Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            src/StackAlchemist.Web/test-results/
            src/StackAlchemist.Web/e2e-results/
          retention-days: 7

  e2e-integration:
    name: E2E Integration (Playwright, Main/Nightly)
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: src/StackAlchemist.Web/pnpm-lock.yaml

      - name: Install Dependencies
        working-directory: src/StackAlchemist.Web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        working-directory: src/StackAlchemist.Web
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup .env (test)
        uses: ./.github/actions/setup-env
        with:
          environment: test
          app_url: https://test.stackalchemist.app
          aspnetcore_environment: Staging
          api_port: "5000"
          engine_api_url: http://sa-engine
          is_test_site: "true"
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-test
          r2_public_url: https://pub-test.stackalchemist.app
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Copy .env to Next.js project
        run: cp .env src/StackAlchemist.Web/.env

      - name: Start Backend Services
        run: docker compose -f docker/docker-compose.test.yml up -d sa-engine sa-worker
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        continue-on-error: true

      - name: Wait for Backend
        run: sleep 10
        continue-on-error: true

      - name: Run Playwright Integration Tests
        working-directory: src/StackAlchemist.Web
        run: pnpm run e2e:integration
        env:
          CI: true

      - name: Upload Integration Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-report
          path: src/StackAlchemist.Web/playwright-report/
          retention-days: 7

      - name: Upload Integration Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-artifacts
          path: |
            src/StackAlchemist.Web/test-results/
            src/StackAlchemist.Web/e2e-results/
          retention-days: 7

      - name: Teardown Backend Services
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v
        continue-on-error: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker, e2e-smoke]
    if: always() && github.event_name != 'schedule'

    steps:
      - name: Check Results
        run: |
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "E2E Smoke: ${{ needs.e2e-smoke.result }}"

          if [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "❌ Frontend checks failed"
            exit 1
          fi

          if [ "${{ needs.backend.result }}" != "success" ]; then
            echo "❌ Backend checks failed"
            exit 1
          fi

          if [ "${{ needs.docker.result }}" != "success" ]; then
            echo "❌ Docker build checks failed"
            exit 1
          fi

          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "❌ E2E smoke checks failed"
            exit 1
          fi

          echo "✅ All required quality gates passed"

name: CI

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && format('Manual · {0}', github.actor)
    || github.event_name == 'schedule' && 'Nightly'
    || github.event_name == 'pull_request' && format('PR #{0} · {1}', github.event.pull_request.number, github.event.pull_request.title)
    || github.event.head_commit.message
  }}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    name: Frontend (Lint, Typecheck, Unit Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/StackAlchemist.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/StackAlchemist.Web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit & Integration Tests
        run: npx vitest run --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-results
          path: src/StackAlchemist.Web/test-results/
          retention-days: 7

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: src/StackAlchemist.Web/coverage/
          retention-days: 7

  backend:
    name: Backend (.NET Build & Test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stackalchemist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          # setup-dotnet's built-in NuGet cache requires packages.lock.json,
          # which this repository does not currently commit.

      - name: Restore Dependencies
        run: dotnet restore StackAlchemist.slnx --configfile NuGet.Config

      - name: Build Engine
        run: dotnet build src/StackAlchemist.Engine/ --no-restore --configuration Release

      - name: Build Worker
        run: dotnet build src/StackAlchemist.Worker/ --no-restore --configuration Release

      - name: Build Engine Tests
        run: dotnet build src/StackAlchemist.Engine.Tests/ --no-restore --configuration Release

      - name: Build Worker Tests
        run: dotnet build src/StackAlchemist.Worker.Tests/ --no-restore --configuration Release

      - name: Run Engine Tests
        run: dotnet test src/StackAlchemist.Engine.Tests/ --no-build --configuration Release --logger "trx;LogFileName=engine-test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=stackalchemist_test;Username=test;Password=test"
          VSTEST_CONNECTION_TIMEOUT: "180"

      - name: Run Worker Tests
        run: dotnet test src/StackAlchemist.Worker.Tests/ --no-build --configuration Release --logger "trx;LogFileName=worker-test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=stackalchemist_test;Username=test;Password=test"
          VSTEST_CONNECTION_TIMEOUT: "180"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: "**/TestResults/"
          retention-days: 7

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [web, engine, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: stackalchemist/${{ matrix.target }}:ci

  e2e-smoke:
    name: E2E Smoke (Playwright, Demo Mode)
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/StackAlchemist.Web/package-lock.json

      - name: Install Dependencies
        working-directory: src/StackAlchemist.Web
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: src/StackAlchemist.Web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Smoke Tests
        working-directory: src/StackAlchemist.Web
        run: npm run e2e:smoke
        env:
          CI: true

      - name: Upload Smoke Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-report
          path: src/StackAlchemist.Web/playwright-report/
          retention-days: 7

      - name: Upload Smoke Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-artifacts
          path: |
            src/StackAlchemist.Web/test-results/
            src/StackAlchemist.Web/e2e-results/
          retention-days: 7

  e2e-integration:
    name: E2E Integration (Playwright, Main/Nightly)
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    needs: [frontend, backend, docker]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Self-test — refuse to run if a SERVICE_ROLE variable is echoed in any workflow
        run: |
          set -euo pipefail
          # Refuse to load secrets if any workflow expands a *_SERVICE_ROLE_* variable
          # into an echo. Annotation messages (no $ before the name) are allowed.
          if grep -rEn 'echo[^|&]*\$[^|&]*SERVICE_ROLE' .github/workflows/ ; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/StackAlchemist.Web/package-lock.json

      - name: Install Dependencies
        working-directory: src/StackAlchemist.Web
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: src/StackAlchemist.Web
        run: npx playwright install --with-deps chromium

      - name: Setup .env (test)
        uses: ./.github/actions/setup-env
        with:
          environment: test
          app_url: https://test.stackalchemist.app
          aspnetcore_environment: Staging
          api_port: "5000"
          engine_api_url: http://localhost:5000
          is_test_site: "true"
          supabase_url: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID || secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-test
          r2_public_url: ${{ secrets.R2_PUBLIC_URL || 'https://pub-test.stackalchemist.app' }}
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN || secrets.CF_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY || secrets.CLAUDE_API_KEY }}
          engine_service_key: ${{ secrets.ENGINE_SERVICE_KEY }}

      - name: Re-mask sensitive .env values
        run: |
          set -euo pipefail
          # GitHub auto-masks `${{ secrets.X }}` literals, but values round-tripped
          # through .env can leak via derived/substring forms. Re-register them.
          for key in SUPABASE_SERVICE_ROLE_KEY STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET ANTHROPIC_API_KEY R2_SECRET_ACCESS_KEY ENGINE_SERVICE_KEY CLOUDFLARE_TUNNEL_TOKEN; do
            value="$(grep -E "^${key}=" .env | head -n1 | cut -d'=' -f2-)"
            if [ -n "$value" ]; then
              echo "::add-mask::${value}"
            fi
          done

      - name: Validate Required Integration Secrets
        id: validate-secrets
        run: |
          set -euo pipefail

          missing=0
          skip_e2e=false

          get_env() {
            local key="$1"
            grep -E "^${key}=" .env | head -n1 | cut -d'=' -f2-
          }

          assert_present() {
            local key="$1"
            local value
            value="$(get_env "$key")"
            if [ -z "$value" ]; then
              echo "::warning::Missing required secret/env value for ${key} — E2E tests will be skipped."
              skip_e2e=true
              return 0
            fi
          }

          assert_pattern() {
            local key="$1"
            local pattern="$2"
            local message="$3"
            local value
            value="$(get_env "$key")"
            if [ -z "$value" ]; then
              return 0
            fi
            if ! printf '%s' "$value" | grep -Eq "$pattern"; then
              echo "::error::${key} failed validation: ${message}"
              missing=1
            fi
          }

          assert_not_placeholder() {
            local key="$1"
            local value
            value="$(get_env "$key")"
            if [ -z "$value" ]; then
              return 0
            fi
            if printf '%s' "$value" | grep -Eqi '(^your[-_]|placeholder|changeme|replace[-_]?me|dummy|example)'; then
              echo "::warning::${key} appears to be a placeholder value — E2E tests will be skipped."
              skip_e2e=true
            fi
          }

          required_keys=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            STRIPE_WEBHOOK_SECRET
            STRIPE_SECRET_KEY
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            CLOUDFLARE_TUNNEL_TOKEN
            ANTHROPIC_API_KEY
            R2_ACCOUNT_ID
            ENGINE_SERVICE_KEY
          )

          for key in "${required_keys[@]}"; do
            assert_present "$key" || true
            assert_not_placeholder "$key"
          done

          if [ "$skip_e2e" = "true" ]; then
            echo "⚠️  One or more secrets are placeholder values. Skipping E2E Integration tests."
            echo "skip_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          assert_pattern NEXT_PUBLIC_SUPABASE_URL '^https://.+\.supabase\.co/?$' 'expected a Supabase project URL.'
          assert_pattern NEXT_PUBLIC_SUPABASE_ANON_KEY '^[^.]+\.[^.]+\.[^.]+$' 'expected a JWT-like anon key.'
          assert_pattern SUPABASE_SERVICE_ROLE_KEY '^[^.]+\.[^.]+\.[^.]+$' 'expected a JWT-like service role key.'
          assert_pattern STRIPE_WEBHOOK_SECRET '^whsec_' 'expected a Stripe webhook signing secret.'
          assert_pattern STRIPE_SECRET_KEY '^sk_' 'expected a Stripe secret key.'
          assert_pattern NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY '^pk_' 'expected a Stripe publishable key.'
          assert_pattern ANTHROPIC_API_KEY '^sk-ant-' 'expected an Anthropic API key.'
          assert_pattern R2_ACCOUNT_ID '^[0-9a-fA-F]{32}$' 'expected a 32-character Cloudflare account id.'
          assert_pattern ENGINE_SERVICE_KEY '^.{32,}$' 'expected a non-trivial engine service key.'
          assert_pattern R2_ACCESS_KEY_ID '^.{16,}$' 'expected a non-trivial R2 access key id.'
          assert_pattern R2_SECRET_ACCESS_KEY '^.{32,}$' 'expected a non-trivial R2 secret access key.'
          assert_pattern CLOUDFLARE_TUNNEL_TOKEN '^.{32,}$' 'expected a non-trivial Cloudflare tunnel token.'

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "skip_e2e=false" >> "$GITHUB_OUTPUT"

      - name: Copy .env to Next.js project
        if: steps.validate-secrets.outputs.skip_e2e != 'true'
        run: cp .env src/StackAlchemist.Web/.env

      - name: Build and Start Backend Services
        if: steps.validate-secrets.outputs.skip_e2e != 'true'
        run: docker compose -f docker/docker-compose.test.yml up -d --build sa-engine sa-worker

      - name: Wait for Backend Health
        if: steps.validate-secrets.outputs.skip_e2e != 'true'
        run: |
          echo "Waiting for Engine API at http://localhost:5000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/healthz > /dev/null 2>&1; then
              echo "✅ Engine healthy after ~${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Engine health check timed out after 60s."
          docker compose -f docker/docker-compose.test.yml logs sa-engine --tail 30
          exit 1

      - name: Run Playwright Integration Tests
        if: steps.validate-secrets.outputs.skip_e2e != 'true'
        working-directory: src/StackAlchemist.Web
        run: npm run e2e:integration
        env:
          CI: true

      - name: Run Playwright Nightly Tests (real APIs, non-blocking)
        # Nightly tests exercise the full external stack (Anthropic, Supabase,
        # R2, Engine). They are slow, cost real API calls, and are flake-prone
        # by design. Run only on schedule + manual dispatch, never block the
        # gate. See e2e/nightly/README or repo issues for known failures.
        if: |
          steps.validate-secrets.outputs.skip_e2e != 'true' &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        working-directory: src/StackAlchemist.Web
        continue-on-error: true
        run: npm run e2e:nightly
        env:
          CI: true

      - name: Dump backend container logs (always, on failure)
        if: always() && steps.validate-secrets.outputs.skip_e2e != 'true'
        run: |
          # Without these, an Engine error during Playwright surfaces only as
          # a generic "Schema extraction failed" in the page snapshot — the
          # actual stack trace is locked inside the container.
          echo "::group::sa-engine logs"
          docker compose -f docker/docker-compose.test.yml logs sa-engine --tail 200 || true
          echo "::endgroup::"
          echo "::group::sa-worker logs"
          docker compose -f docker/docker-compose.test.yml logs sa-worker --tail 200 || true
          echo "::endgroup::"

      - name: Upload Integration Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-integration-report
          path: src/StackAlchemist.Web/playwright-report/
          retention-days: 7

      - name: Upload Integration Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-integration-artifacts
          path: |
            src/StackAlchemist.Web/test-results/
            src/StackAlchemist.Web/e2e-results/
          retention-days: 7

      - name: Teardown Backend Services
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v
        continue-on-error: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker, e2e-smoke]
    if: always() && github.event_name != 'schedule'

    steps:
      - name: Check Results
        run: |
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "E2E Smoke: ${{ needs.e2e-smoke.result }}"

          if [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "❌ Frontend checks failed"
            exit 1
          fi

          if [ "${{ needs.backend.result }}" != "success" ]; then
            echo "❌ Backend checks failed"
            exit 1
          fi

          if [ "${{ needs.docker.result }}" != "success" ]; then
            echo "❌ Docker build checks failed"
            exit 1
          fi

          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "❌ E2E smoke checks failed"
            exit 1
          fi

          echo "✅ All required quality gates passed"

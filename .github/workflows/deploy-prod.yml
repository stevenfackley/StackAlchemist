name: Deploy Production Site

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Web App to Production Server
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env (production)
        uses: ./.github/actions/setup-env
        with:
          environment: production
          app_url: https://stackalchemist.app
          aspnetcore_environment: Production
          api_port: '5000'
          engine_api_url: http://sa-engine
          is_test_site: 'false'
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-prod
          r2_public_url: ${{ secrets.R2_PUBLIC_URL }}
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          engine_service_key: ${{ secrets.ENGINE_SERVICE_KEY }}

      - name: Docker pre-flight cleanup
        shell: bash
        run: bash ./scripts/docker-preflight-cleanup.sh

      - name: Build Next.js web image
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          set -Eeuo pipefail

          docker image rm -f sa-web-app:prod >/dev/null 2>&1 || true

          IMAGE_TAG="sa-web-app:${GITHUB_SHA::12}"
          docker build \
            --target web \
            --pull \
            --no-cache \
            --build-arg NEXT_PUBLIC_APP_URL=https://stackalchemist.app \
            -t "$IMAGE_TAG" \
            .

          docker tag "$IMAGE_TAG" sa-web-app:prod
          docker image rm -f "$IMAGE_TAG" >/dev/null 2>&1 || true
          echo "✅ Image built and tagged as sa-web-app:prod"

      - name: Swap web container
        run: |
          set -Eeuo pipefail

          dump_sa_web_diagnostics() {
            echo "── docker ps (sa-web) ──"
            docker ps -a --filter name=sa-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" || true

            echo "── docker inspect (sa-web) ──"
            docker inspect sa-web || true

            echo "── docker logs (sa-web) ──"
            docker logs --tail 200 sa-web || true

            echo "── in-container probe (sa-web) ──"
            docker exec sa-web node -e "fetch('http://127.0.0.1:3000/').then((res) => { console.log('status=' + res.status); process.exit(res.ok ? 0 : 1); }).catch((err) => { console.error(err); process.exit(1); })" || true
          }

          docker stop sa-web 2>/dev/null || true
          docker rm sa-web 2>/dev/null || true

          docker run -d \
            --name sa-web \
            --restart unless-stopped \
            --network under-construction_default \
            -p 3000:3000 \
            --env-file .env \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_APP_URL=https://stackalchemist.app \
            sa-web-app:prod

          for i in {1..20}; do
            if [ "$(docker inspect -f '{{.State.Running}}' sa-web 2>/dev/null || echo false)" != "true" ]; then
              echo "❌ sa-web exited during startup"
              dump_sa_web_diagnostics
              exit 1
            fi

            if docker exec sa-web node -e "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" 2>/dev/null; then
              echo "✅ Web app responded successfully."
              break
            fi

            if [ "$i" -eq 20 ]; then
              echo "❌ sa-web did not become healthy in time"
              dump_sa_web_diagnostics
              exit 1
            fi

            sleep 3
          done

          echo "✅ Web app deployed."
          docker ps --filter name=sa-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Fallback to placeholder on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — restoring under-construction placeholder..."
          docker stop sa-web 2>/dev/null || true
          docker rm sa-web 2>/dev/null || true
          docker run -d \
            --name sa-web \
            --restart unless-stopped \
            --network under-construction_default \
            -p 3000:3000 \
            -v /root/under-construction/index.html:/usr/share/nginx/html/index.html:ro \
            -v /root/under-construction/favicon.svg:/usr/share/nginx/html/favicon.svg:ro \
            -v /root/under-construction/nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:alpine
          echo "Placeholder restored."

      - name: Post-deploy Docker cleanup
        if: always()
        run: |
          docker image prune -f 2>/dev/null || true
          docker builder prune -f --filter "until=1h" 2>/dev/null || true
          echo "── Post-deploy disk usage ──"
          df -h / 2>/dev/null || true

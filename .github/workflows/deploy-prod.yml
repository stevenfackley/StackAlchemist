name: Deploy Production Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy Production Stack
    timeout-minutes: 30
    runs-on:
      - self-hosted
      - linux
      - ARM64
      - prod
    environment: prod
    env:
      COMPOSE_PROJECT_NAME: stackalchemist-prod
      DEPLOY_DIR: /opt/stackalchemist-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Explain OIDC usage
        run: |
          echo "This workflow requests GitHub OIDC tokens so future AWS-integrated steps can assume an IAM role."
          echo "The current production deploy runs locally on the EC2 self-hosted runner and does not require SSH deployment."

      - name: Configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Confirm OIDC role assumption
        shell: bash
        run: |
          echo "AWS OIDC credentials configured successfully for region: ${AWS_REGION}"
          echo "Role assumption completed via aws-actions/configure-aws-credentials."

      - name: Setup .env (prod)
        uses: ./.github/actions/setup-env
        with:
          environment: production
          app_url: https://stackalchemist.app
          aspnetcore_environment: Production
          api_port: '5000'
          engine_api_url: http://sa-engine
          is_test_site: 'false'
          supabase_url: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID || secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2_bucket_name: stackalchemist-generations-prod
          r2_public_url: ${{ secrets.R2_PUBLIC_URL }}
          cloudflare_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN || secrets.CF_TUNNEL_TOKEN }}
          stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY || secrets.CLAUDE_API_KEY }}
          engine_service_key: ${{ secrets.ENGINE_SERVICE_KEY }}

      - name: Docker pre-flight cleanup
        shell: bash
        run: bash ./scripts/docker-preflight-cleanup.sh

      - name: Runner diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Runner: ${RUNNER_NAME:-unknown} (${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown})"
          echo "Docker version:"
          docker version
          echo ""
          echo "Docker system usage:"
          docker system df || true
          echo ""
          echo "Disk usage:"
          df -h / || true
          echo ""
          echo "Memory:"
          free -h || true

      - name: Verify Docker Compose file
        shell: bash
        run: docker compose -f docker-compose.prod.yml config >/dev/null

      - name: Start maintenance page
        shell: bash
        run: |
          set -Eeuo pipefail
          # Tear down old app containers before building so the build doesn't race
          # with running containers consuming RAM. sa-tunnel is intentionally
          # excluded — it's a long-lived standalone container that must survive
          # deploys to avoid Cloudflare Error 1033.
          docker rm -f sa-web sa-engine sa-worker sa-reverse-proxy 2>/dev/null || true

          # Ensure the prod network exists so the maintenance container and
          # the persistent tunnel can communicate.
          docker network create stackalchemist-prod 2>/dev/null || true

          # Swap in a lightweight maintenance nginx as sa-reverse-proxy.
          # This keeps the tunnel serving real HTTP traffic (maintenance page)
          # throughout the 4–8 min build window instead of returning a 1033.
          docker run -d \
            --name sa-reverse-proxy \
            --restart no \
            --network stackalchemist-prod \
            -v "$(pwd)/docker/maintenance.html:/usr/share/nginx/html/maintenance.html:ro" \
            -v "$(pwd)/docker/nginx-maintenance.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine

          # Reconnect the persistent tunnel to the network so it can route to
          # the maintenance container. Fails silently if tunnel doesn't exist yet.
          if docker inspect sa-tunnel &>/dev/null; then
            docker network connect stackalchemist-prod sa-tunnel 2>/dev/null || true
            echo "✅ sa-tunnel connected — maintenance page is live."
          else
            echo "ℹ️  sa-tunnel not found — tunnel will connect after first manual setup."
          fi

      - name: Build production images
        shell: bash
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_PARALLEL_LIMIT: '1'
        run: |
          set -Eeuo pipefail
          echo "Building images in workspace root (sequentially to save resources)..."
          for service in sa-web sa-engine; do
            attempt=1
            until docker compose -f docker-compose.prod.yml build "$service"; do
              if [ "$attempt" -ge 2 ]; then
                echo "❌ Failed to build $service after $attempt attempts."
                exit 1
              fi
              attempt=$((attempt + 1))
              echo "Retrying build for $service after a short cooldown..."
              docker builder prune -f --filter "until=1h" 2>/dev/null || true
              sleep 15
            done
          done

      - name: Setup reboot resilience
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo mkdir -p "$DEPLOY_DIR"
          sudo cp docker-compose.prod.yml "$DEPLOY_DIR/"
          sudo cp Dockerfile "$DEPLOY_DIR/"
          sudo cp .env "$DEPLOY_DIR/"
          sudo cp -r docker/ "$DEPLOY_DIR/"
          sudo cp docker/stackalchemist-prod.service /etc/systemd/system/stackalchemist-prod.service
          sudo systemctl daemon-reload
          sudo systemctl enable stackalchemist-prod.service
          echo "✅ Reboot resilience configured at $DEPLOY_DIR"

      - name: Build and deploy production stack
        shell: bash
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_PARALLEL_LIMIT: '1'
        run: |
          set -Eeuo pipefail
          cd "$DEPLOY_DIR"

          # Remove the maintenance sa-reverse-proxy before compose up so
          # --force-recreate can create the real container without a name conflict.
          # sa-tunnel is NOT removed — it is a long-lived standalone container
          # managed outside compose to avoid Cloudflare Error 1033 on every deploy.
          docker rm -f sa-reverse-proxy 2>/dev/null || true

          docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

          # Reconnect the persistent tunnel to the freshly-created network.
          # compose up creates a new stackalchemist-prod network; the standalone
          # sa-tunnel container loses access to sa-reverse-proxy by container name.
          if docker inspect sa-tunnel &>/dev/null; then
            docker network connect stackalchemist-prod sa-tunnel 2>/dev/null || true
            echo "✅ sa-tunnel reconnected to stackalchemist-prod network."
          fi

      - name: Wait for health checks
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$DEPLOY_DIR"
          echo "Waiting for containers to become healthy..."
          MAX_WAIT=120
          INTERVAL=5
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            UNHEALTHY=$(docker compose -f docker-compose.prod.yml ps --format json | \
              python3 -c "
          import sys, json
          unhealthy = 0
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              svc = json.loads(line)
              health = svc.get('Health', '')
              if health != 'healthy':
                  unhealthy += 1
                  print(f\"  {svc.get('Name','?')}: {svc.get('State','?')} ({health or 'no healthcheck'})\", file=sys.stderr)
          print(unhealthy)
          " 2>&1)
            # Extract the count (last line of output)
            COUNT=$(echo "$UNHEALTHY" | tail -1)
            if [ "$COUNT" = "0" ]; then
              echo "✅ All containers healthy after ${ELAPSED}s"
              break
            fi
            echo "⏳ ${COUNT} container(s) not yet healthy (${ELAPSED}s / ${MAX_WAIT}s)..."
            echo "$UNHEALTHY" | head -n -1
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ FATAL: Containers did not become healthy within ${MAX_WAIT}s"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail 30
            exit 1
          fi

      - name: Verify site is reachable
        shell: bash
        run: |
          echo "Verifying site via Cloudflare tunnel..."
          sleep 5
          HTTP_CODE=$(wget --spider -S --timeout=10 https://stackalchemist.app 2>&1 | grep "HTTP/" | tail -1 | awk '{print $2}' || true)
          if [ -z "$HTTP_CODE" ]; then
            echo "⚠️ Could not reach https://stackalchemist.app — tunnel may still be connecting"
          elif [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 400 ] 2>/dev/null; then
            echo "✅ Site returned HTTP ${HTTP_CODE}"
          else
            echo "❌ Site returned HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Capture deploy diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts/deploy-prod
          docker ps -a > .artifacts/deploy-prod/docker-ps.txt
          docker compose -f docker-compose.prod.yml ps > .artifacts/deploy-prod/compose-ps-workspace.txt 2>&1 || true
          docker compose -f docker-compose.prod.yml logs --tail 200 > .artifacts/deploy-prod/compose-workspace.log 2>&1 || true
          if [ -d "$DEPLOY_DIR" ]; then
            cd "$DEPLOY_DIR"
            docker compose -f docker-compose.prod.yml ps > "$GITHUB_WORKSPACE/.artifacts/deploy-prod/compose-ps-deploy-dir.txt" 2>&1 || true
            docker compose -f docker-compose.prod.yml logs --tail 200 > "$GITHUB_WORKSPACE/.artifacts/deploy-prod/compose-deploy-dir.log" 2>&1 || true
          fi
          docker logs sa-engine > .artifacts/deploy-prod/sa-engine.log 2>&1 || true
          docker logs sa-web > .artifacts/deploy-prod/sa-web.log 2>&1 || true
          docker logs sa-reverse-proxy > .artifacts/deploy-prod/sa-reverse-proxy.log 2>&1 || true
          docker logs sa-tunnel > .artifacts/deploy-prod/sa-tunnel.log 2>&1 || true

      - name: Upload deploy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-prod-diagnostics
          path: .artifacts/deploy-prod/
          retention-days: 7

      - name: Show running containers
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$DEPLOY_DIR"
          docker compose -f docker-compose.prod.yml ps

      - name: Post-deploy Docker cleanup
        if: always()
        shell: bash
        run: |
          docker image prune -f 2>/dev/null || true
          docker builder prune -f --filter "until=1h" 2>/dev/null || true
          df -h / 2>/dev/null || true

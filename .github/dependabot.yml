version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 10
    groups:
      dotnet-runtime:
        patterns: ["Microsoft.Extensions.*", "Microsoft.AspNetCore.*"]
      testing:
        patterns: ["xunit*", "coverlet.*", "Microsoft.NET.Test.*", "NetArchTest.*"]

  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 10
    groups:
      next-react:
        patterns: ["next", "react*", "eslint-config-next"]
      testing:
        patterns: ["vitest*", "@testing-library/*", "@playwright/*", "jsdom"]

  - package-ecosystem: npm
    directory: /src/StackAlchemist.Web
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 10
    groups:
      next-react:
        patterns: ["next", "react*", "eslint-config-next"]
      testing:
        patterns: ["vitest*", "@testing-library/*", "@playwright/*", "jsdom"]
    ignore:
      # eslint pinned to ^9 because eslint-plugin-react (transitive via eslint-config-next)
      # uses context.getFilename() which was removed in ESLint 10.
      # Re-evaluate when eslint-config-next ships an eslint-plugin-react that uses context.filename.
      # See PRs #65 (original pin) and the follow-up that re-pinned after Dependabot bypassed via #72.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /src/StackAlchemist.Templates
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday }

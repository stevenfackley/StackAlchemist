name: 'Setup Environment File'
description: 'Generates a .env file from GitHub Actions secrets for the specified environment'

inputs:
  environment:
    description: 'Target environment: development | test | production'
    required: true

  # ─── App ────────────────────────────────────────────────────────────────────
  app_url:
    description: 'Public URL for the app (NEXT_PUBLIC_APP_URL)'
    required: true

  aspnetcore_environment:
    description: 'ASP.NET Core environment name'
    required: true

  api_port:
    description: 'API port'
    required: false
    default: '5000'

  engine_api_url:
    description: 'Internal URL for the generation engine'
    required: false
    default: ''

  is_test_site:
    description: 'Whether to enable the staging/test banner'
    required: false
    default: 'false'

  # ─── Supabase ────────────────────────────────────────────────────────────────
  supabase_url:
    description: 'Supabase project URL'
    required: true

  supabase_anon_key:
    description: 'Supabase anon/public key'
    required: true

  supabase_service_role_key:
    description: 'Supabase service role key (secret)'
    required: true

  # ─── Cloudflare R2 ───────────────────────────────────────────────────────────
  cf_account_id:
    description: 'Cloudflare account ID'
    required: true

  r2_access_key_id:
    description: 'R2 access key ID'
    required: true

  r2_secret_access_key:
    description: 'R2 secret access key'
    required: true

  r2_bucket_name:
    description: 'R2 bucket name for this environment'
    required: true

  r2_public_url:
    description: 'R2 public download URL'
    required: true

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflare_tunnel_token:
    description: 'Cloudflare Tunnel token for the target environment'
    required: false
    default: ''

  # ─── Stripe ──────────────────────────────────────────────────────────────────
  stripe_publishable_key:
    description: 'Stripe publishable key'
    required: true

  stripe_secret_key:
    description: 'Stripe secret key'
    required: true

  stripe_webhook_secret:
    description: 'Stripe webhook signing secret'
    required: true

  # ─── LLM APIs ────────────────────────────────────────────────────────────────
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true

  # ─── Engine ──────────────────────────────────────────────────────────────────
  engine_service_key:
    description: 'Shared secret for Next.js → Engine API authentication (X-Engine-Key header)'
    required: false
    default: ''

  # ─── SEO / Analytics ─────────────────────────────────────────────────────────
  plausible_domain:
    description: 'Plausible analytics domain (prod only — never set on test to avoid polluting metrics)'
    required: false
    default: ''

  google_site_verification:
    description: 'Google Search Console verification token (prod only)'
    required: false
    default: ''

  # ─── Test Site Protection ────────────────────────────────────────────────────
  test_site_basic_auth_user:
    description: 'Basic Auth username for test mirror (test only). Empty on prod.'
    required: false
    default: ''

  test_site_basic_auth_pass:
    description: 'Basic Auth password for test mirror (test only). Empty on prod.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Write .env file
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        APP_URL: ${{ inputs.app_url }}
        ASPNETCORE_ENV: ${{ inputs.aspnetcore_environment }}
        API_PORT: ${{ inputs.api_port }}
        ENGINE_API_URL: ${{ inputs.engine_api_url }}
        IS_TEST_SITE: ${{ inputs.is_test_site }}
        SUPABASE_URL: ${{ inputs.supabase_url }}
        SUPABASE_ANON_KEY: ${{ inputs.supabase_anon_key }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ inputs.supabase_service_role_key }}
        CF_ACCOUNT_ID: ${{ inputs.cf_account_id }}
        R2_ACCESS_KEY_ID: ${{ inputs.r2_access_key_id }}
        R2_SECRET_ACCESS_KEY: ${{ inputs.r2_secret_access_key }}
        R2_BUCKET_NAME: ${{ inputs.r2_bucket_name }}
        R2_PUBLIC_URL: ${{ inputs.r2_public_url }}
        CF_TUNNEL_TOKEN: ${{ inputs.cloudflare_tunnel_token }}
        STRIPE_PUBLISHABLE_KEY: ${{ inputs.stripe_publishable_key }}
        STRIPE_SECRET_KEY: ${{ inputs.stripe_secret_key }}
        STRIPE_WEBHOOK_SECRET: ${{ inputs.stripe_webhook_secret }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ENGINE_SERVICE_KEY: ${{ inputs.engine_service_key }}
        PLAUSIBLE_DOMAIN: ${{ inputs.plausible_domain }}
        GOOGLE_SITE_VERIFICATION: ${{ inputs.google_site_verification }}
        TEST_SITE_BASIC_AUTH_USER: ${{ inputs.test_site_basic_auth_user }}
        TEST_SITE_BASIC_AUTH_PASS: ${{ inputs.test_site_basic_auth_pass }}
      run: |
        cat > .env <<EOF
        # Generated by GitHub Actions — environment: ${ENVIRONMENT}
        # DO NOT edit manually. See .github/actions/setup-env/action.yml

        # Frontend (Next.js)
        NEXT_PUBLIC_APP_URL=${APP_URL}
        NEXT_PUBLIC_IS_TEST_SITE=${IS_TEST_SITE}
        ENGINE_API_URL=${ENGINE_API_URL}

        # Backend (.NET API)
        ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENV}
        API_PORT=${API_PORT}

        # Supabase
        NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

        # Cloudflare R2
        R2_ACCOUNT_ID=${CF_ACCOUNT_ID}
        R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
        R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
        R2_BUCKET_NAME=${R2_BUCKET_NAME}
        R2_PUBLIC_URL=${R2_PUBLIC_URL}
        R2_S3_URL=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com
        R2_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com

        # Cloudflare Tunnel
        CLOUDFLARE_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}

        # Stripe
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
        STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
        STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}

        # LLM APIs
        ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

        # Engine auth
        ENGINE_SERVICE_KEY=${ENGINE_SERVICE_KEY}

        # SEO / Analytics (prod only)
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${PLAUSIBLE_DOMAIN}
        GOOGLE_SITE_VERIFICATION=${GOOGLE_SITE_VERIFICATION}

        # Test site Basic Auth (test only)
        TEST_SITE_BASIC_AUTH_USER=${TEST_SITE_BASIC_AUTH_USER}
        TEST_SITE_BASIC_AUTH_PASS=${TEST_SITE_BASIC_AUTH_PASS}
        EOF

        # Strip leading whitespace added by heredoc indentation
        sed -i 's/^        //' .env

        echo "✅ .env generated for environment: ${ENVIRONMENT}"
